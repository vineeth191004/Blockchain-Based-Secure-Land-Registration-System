# docker-compose-machine-b.yaml
# ═══════════════════════════════════════════════════════════════════════════
#  ORDERER 2  —  HIGH-THROUGHPUT ORDERER  (Machine B)
#  Role    : Optimized for volume — faster block cutting, larger batches
#  Special : Tuned batch env overrides, chaincode trace logging, resource
#            caps, gossip-aware peer setup for Org2 (Bank Department)
# ═══════════════════════════════════════════════════════════════════════════
# Usage: IP_MACHINE_A=x IP_MACHINE_B=y IP_MACHINE_C=z \
#          docker compose -f docker-compose-machine-b.yaml up -d

volumes:
  orderer2.example.com:
  peer0.org2.example.com:

networks:
  test:
    name: fabric_test

services:

  # ──────────────────────────────────────────────────────────────────────────
  #  HIGH-THROUGHPUT ORDERER
  #  Tuned for: max transaction throughput, fast block cutting timeout,
  #             large batch sizes, syslog-structured logging
  # ──────────────────────────────────────────────────────────────────────────
  orderer2.example.com:
    container_name: orderer2.example.com
    image: hyperledger/fabric-orderer:latest
    labels:
      service: hyperledger-fabric
      role: high-throughput-orderer
      org: orderer-org
      machine: B
    environment:
      # ── Core — WARNING level keeps logs lean, maximising throughput ───────
      - FABRIC_LOGGING_SPEC=WARNING:orderer.common.server=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      # ── TLS ───────────────────────────────────────────────────────────────
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Raft: balanced timeout — yield leader quickly if needed
      - ORDERER_GENERAL_CLUSTER_DIALTIMEOUT=5s
      - ORDERER_GENERAL_CLUSTER_RPCTIMEOUT=5s
      # ── Channel Participation ─────────────────────────────────────────────
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      # ── Admin API ─────────────────────────────────────────────────────────
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      # ── Observability ─────────────────────────────────────────────────────
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
      - ORDERER_METRICS_PROVIDER=prometheus
      # ── HIGH-THROUGHPUT BATCH TUNING ─────────────────────────────────────
      # Cut blocks faster: 500ms timeout instead of 2s
      - ORDERER_GENERAL_BATCHTIMEOUT=500ms
      # Accept more messages per block: up to 500 (vs default 10)
      - ORDERER_GENERAL_BATCHSIZE_MAXMESSAGECOUNT=500
      # Larger preferred block size: 2MB payload preferred
      - ORDERER_GENERAL_BATCHSIZE_PREFERREDMAXBYTES=2097152
      # Hard ceiling: 100MB
      - ORDERER_GENERAL_BATCHSIZE_ABSOLUTEMAXBYTES=104857600
    working_dir: /root
    command: orderer
    # ── Healthcheck ────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:9443/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    # ── Higher CPU allocation for throughput ──────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
    # ── syslog-format output for integration with log aggregators ──────────
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
        tag: "orderer2-htp"
    volumes:
      - ../organizations/ordererOrganizations/example.com/orderers/orderer2.example.com/msp:/var/hyperledger/orderer/msp
      - ../organizations/ordererOrganizations/example.com/orderers/orderer2.example.com/tls/:/var/hyperledger/orderer/tls
      - orderer2.example.com:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
      - 7053:7053
      - 9443:9443
    extra_hosts:
      - "orderer.example.com:${IP_MACHINE_A}"
      - "orderer3.example.com:${IP_MACHINE_C}"
      - "peer0.org1.example.com:${IP_MACHINE_A}"
      - "peer0.org3.example.com:${IP_MACHINE_C}"
    networks:
      - test

  # ──────────────────────────────────────────────────────────────────────────
  #  ORG 2 PEER  —  Bank Department
  #  Special: gossip discovery enabled for all orgs for financial settlement
  # ──────────────────────────────────────────────────────────────────────────
  peer0.org2.example.com:
    container_name: peer0.org2.example.com
    image: hyperledger/fabric-peer:latest
    labels:
      service: hyperledger-fabric
      org: org2
      department: bank
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_test
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.org2.example.com
      - CORE_PEER_ADDRESS=peer0.org2.example.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org2.example.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org2.example.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org2.example.com:9051
      # Peer gossip: discover new orgs automatically
      - CORE_PEER_GOSSIP_USELEADERELECTION=true
      - CORE_PEER_GOSSIP_ORGLEADER=false
      - CORE_PEER_LOCALMSPID=Org2MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9445
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0org2"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:9445/healthz"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    volumes:
      - ../organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com:/etc/hyperledger/fabric
      - peer0.org2.example.com:/var/hyperledger/production
      - ./peercfg:/etc/hyperledger/peercfg
      - /var/run/docker.sock:/host/var/run/docker.sock
    working_dir: /root
    command: peer node start
    ports:
      - 9051:9051
      - 9445:9445
    extra_hosts:
      - "orderer.example.com:${IP_MACHINE_A}"
      - "orderer2.example.com:${IP_MACHINE_B}"
      - "orderer3.example.com:${IP_MACHINE_C}"
      - "peer0.org1.example.com:${IP_MACHINE_A}"
      - "peer0.org3.example.com:${IP_MACHINE_C}"
    networks:
      - test
