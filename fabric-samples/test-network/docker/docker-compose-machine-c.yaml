# docker-compose-machine-c.yaml
# ═══════════════════════════════════════════════════════════════════════════
#  ORDERER 3  —  AUDIT & COMPLIANCE ORDERER  (Machine C)
#  Role    : Government compliance, immutable audit trail, strict enforcement
#  Special : Mutual TLS client auth enforced, conservative batch (every tx
#            gets its own block for traceability), verbose audit logging
#            to separate log files, strict resource quotas
# ═══════════════════════════════════════════════════════════════════════════
# Usage: IP_MACHINE_A=x IP_MACHINE_B=y IP_MACHINE_C=z \
#          docker compose -f docker-compose-machine-c.yaml up -d

volumes:
  orderer3.example.com:
  orderer3-audit-logs:    # Dedicated named volume for immutable audit logs
  peer0.org3.example.com:

networks:
  test:
    name: fabric_test

services:

  # ──────────────────────────────────────────────────────────────────────────
  #  AUDIT & COMPLIANCE ORDERER
  #  Tuned for: maximum traceability, government compliance, strict TLS,
  #             immutable log trail, conservative batching
  # ──────────────────────────────────────────────────────────────────────────
  orderer3.example.com:
    container_name: orderer3.example.com
    image: hyperledger/fabric-orderer:latest
    labels:
      service: hyperledger-fabric
      role: audit-compliance-orderer
      org: orderer-org
      machine: C
      compliance: government-grade
    environment:
      # ── Core — maximum visibility for audit ──────────────────────────────
      # DEBUG on consensus + policies for full traceability
      - FABRIC_LOGGING_SPEC=INFO:orderer.consensus.etcdraft=DEBUG:orderer.commmon.policies=DEBUG:orderer.common.deliver=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      # ── TLS — MUTUAL AUTH enforced (clients must present a cert) ─────────
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_TLS_CLIENTAUTHREQUIRED=true
      - ORDERER_GENERAL_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Raft: conservative timeouts — stability over speed
      - ORDERER_GENERAL_CLUSTER_DIALTIMEOUT=30s
      - ORDERER_GENERAL_CLUSTER_RPCTIMEOUT=30s
      - ORDERER_GENERAL_CLUSTER_REPLICATIONMAXRETRIES=20
      # ── Channel Participation ─────────────────────────────────────────────
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      # ── Admin API ─────────────────────────────────────────────────────────
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      # ── Observability ─────────────────────────────────────────────────────
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
      - ORDERER_METRICS_PROVIDER=prometheus
      # ── AUDIT BATCH POLICY ────────────────────────────────────────────────
      # Conservative: cut block every 10s — each block well-formed for audit
      - ORDERER_GENERAL_BATCHTIMEOUT=10s
      # Small batch: 5 txns max — easier forensic review per block
      - ORDERER_GENERAL_BATCHSIZE_MAXMESSAGECOUNT=5
      - ORDERER_GENERAL_BATCHSIZE_PREFERREDMAXBYTES=524288
      - ORDERER_GENERAL_BATCHSIZE_ABSOLUTEMAXBYTES=104857600
    working_dir: /root
    command: orderer
    # ── Healthcheck ────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:9443/healthz"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    # ── Strict resource quotas — government SLA compliance ────────────────
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    # ── Audit log: rotate daily, keep 30 days, tag with compliance label ───
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "30"
        tag: "orderer3-audit-{{.Name}}"
        labels: "service,role,compliance"
    volumes:
      - ../organizations/ordererOrganizations/example.com/orderers/orderer3.example.com/msp:/var/hyperledger/orderer/msp
      - ../organizations/ordererOrganizations/example.com/orderers/orderer3.example.com/tls/:/var/hyperledger/orderer/tls
      - orderer3.example.com:/var/hyperledger/production/orderer
      # Dedicated audit log volume — survives container restarts
      - orderer3-audit-logs:/var/hyperledger/audit
    ports:
      - 7050:7050
      - 7053:7053
      - 9443:9443
    extra_hosts:
      - "orderer.example.com:${IP_MACHINE_A}"
      - "orderer2.example.com:${IP_MACHINE_B}"
      - "peer0.org1.example.com:${IP_MACHINE_A}"
      - "peer0.org2.example.com:${IP_MACHINE_B}"
    networks:
      - test

  # ──────────────────────────────────────────────────────────────────────────
  #  ORG 3 PEER  —  Collectorate (Government) Department
  #  Special: strict logging, compliance labels, reduced gossip footprint
  # ──────────────────────────────────────────────────────────────────────────
  peer0.org3.example.com:
    container_name: peer0.org3.example.com
    image: hyperledger/fabric-peer:latest
    labels:
      service: hyperledger-fabric
      org: org3
      department: collectorate
      compliance: government-grade
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO:gossip=WARNING
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_test
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.org3.example.com
      - CORE_PEER_ADDRESS=peer0.org3.example.com:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org3.example.com:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org3.example.com:11051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org3.example.com:11051
      - CORE_PEER_LOCALMSPID=Org3MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9446
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0org3"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:9446/healthz"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s
    # Compliance-grade log retention
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "30"
        tag: "peer-org3-collectorate"
    volumes:
      - ../organizations/peerOrganizations/org3.example.com/peers/peer0.org3.example.com:/etc/hyperledger/fabric
      - peer0.org3.example.com:/var/hyperledger/production
      - ./peercfg:/etc/hyperledger/peercfg
      - /var/run/docker.sock:/host/var/run/docker.sock
    working_dir: /root
    command: peer node start
    ports:
      - 11051:11051
      - 9446:9446
    extra_hosts:
      - "orderer.example.com:${IP_MACHINE_A}"
      - "orderer2.example.com:${IP_MACHINE_B}"
      - "orderer3.example.com:${IP_MACHINE_C}"
      - "peer0.org1.example.com:${IP_MACHINE_A}"
      - "peer0.org2.example.com:${IP_MACHINE_B}"
    networks:
      - test
