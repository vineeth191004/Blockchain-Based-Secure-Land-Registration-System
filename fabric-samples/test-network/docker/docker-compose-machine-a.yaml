# docker-compose-machine-a.yaml
# ═══════════════════════════════════════════════════════════════════════════
#  ORDERER 1  —  PRIMARY ADMIN ORDERER  (Machine A)
#  Role    : Raft leader candidate, channel admin, primary operations hub
#  Special : Prometheus metrics, Docker healthcheck, full structured logging,
#            operations dashboard on :9443
# ═══════════════════════════════════════════════════════════════════════════
# Usage: IP_MACHINE_A=x IP_MACHINE_B=y IP_MACHINE_C=z \
#          docker compose -f docker-compose-machine-a.yaml up -d

volumes:
  orderer.example.com:
  peer0.org1.example.com:

networks:
  test:
    name: fabric_test

services:

  # ──────────────────────────────────────────────────────────────────────────
  #  PRIMARY ORDERER
  #  Tuned for: observability, health monitoring, channel administration
  # ──────────────────────────────────────────────────────────────────────────
  orderer.example.com:
    container_name: orderer.example.com
    image: hyperledger/fabric-orderer:latest
    labels:
      service: hyperledger-fabric
      role: primary-admin-orderer
      org: orderer-org
      machine: A
    environment:
      # ── Core ──────────────────────────────────────────────────────────────
      - FABRIC_LOGGING_SPEC=INFO:orderer.consensus.etcdraft=DEBUG
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      # ── TLS ───────────────────────────────────────────────────────────────
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      # Raft cluster heartbeat tuning — primary orderer is aggressive
      - ORDERER_GENERAL_CLUSTER_DIALTIMEOUT=10s
      - ORDERER_GENERAL_CLUSTER_RPCTIMEOUT=10s
      - ORDERER_GENERAL_CLUSTER_REPLICATIONMAXRETRIES=12
      # ── Channel Participation (modern — no system channel) ─────────────
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      # ── Admin API ─────────────────────────────────────────────────────────
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      # ── Observability (Prometheus metrics exposed on :9443) ────────────
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
      - ORDERER_METRICS_PROVIDER=prometheus
      # ── Block storage: keep all blocks (primary is the archive) ──────
      - ORDERER_FILELEDGER_PREFIX=hyperledger-fabric-orderer
    working_dir: /root
    command: orderer
    # ── Health check: poll the operations endpoint ─────────────────────────
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:9443/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    # ── Resource limits ───────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    # ── Structured JSON log output ─────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,role"
    volumes:
      - ../organizations/ordererOrganizations/example.com/orderers/orderer.example.com/msp:/var/hyperledger/orderer/msp
      - ../organizations/ordererOrganizations/example.com/orderers/orderer.example.com/tls/:/var/hyperledger/orderer/tls
      - orderer.example.com:/var/hyperledger/production/orderer
    ports:
      - 7050:7050   # Orderer listen
      - 7053:7053   # Admin API (osnadmin)
      - 9443:9443   # Prometheus / ops
    extra_hosts:
      - "orderer2.example.com:${IP_MACHINE_B}"
      - "orderer3.example.com:${IP_MACHINE_C}"
      - "peer0.org2.example.com:${IP_MACHINE_B}"
      - "peer0.org3.example.com:${IP_MACHINE_C}"
    networks:
      - test

  # ──────────────────────────────────────────────────────────────────────────
  #  ORG 1 PEER  —  Land Registry Department
  # ──────────────────────────────────────────────────────────────────────────
  peer0.org1.example.com:
    container_name: peer0.org1.example.com
    image: hyperledger/fabric-peer:latest
    labels:
      service: hyperledger-fabric
      org: org1
      department: land-registry
    environment:
      - FABRIC_CFG_PATH=/etc/hyperledger/peercfg
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_test
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.org1.example.com
      - CORE_PEER_ADDRESS=peer0.org1.example.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.org1.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.org1.example.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.org1.example.com:7051
      - CORE_PEER_LOCALMSPID=Org1MSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9444
      - CORE_METRICS_PROVIDER=prometheus
      - CHAINCODE_AS_A_SERVICE_BUILDER_CONFIG={"peername":"peer0org1"}
      - CORE_CHAINCODE_EXECUTETIMEOUT=300s
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:9444/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    volumes:
      - ../organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com:/etc/hyperledger/fabric
      - peer0.org1.example.com:/var/hyperledger/production
      - ./peercfg:/etc/hyperledger/peercfg
      - /var/run/docker.sock:/host/var/run/docker.sock
    working_dir: /root
    command: peer node start
    ports:
      - 7051:7051
      - 9444:9444
    extra_hosts:
      - "orderer.example.com:${IP_MACHINE_A}"
      - "orderer2.example.com:${IP_MACHINE_B}"
      - "orderer3.example.com:${IP_MACHINE_C}"
      - "peer0.org2.example.com:${IP_MACHINE_B}"
      - "peer0.org3.example.com:${IP_MACHINE_C}"
    networks:
      - test
